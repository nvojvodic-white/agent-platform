name: Helm Validation

on:
  pull_request:
    branches: [master, main]
    paths:
      - "charts/**"
      - "k8s/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  helm-dry-run:
    name: Helm Dry-Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Lint chart
        run: helm lint charts/agent-platform --set anthropicApiKey=test-key

      - name: Template dry-run
        run: |
          helm template agent-platform charts/agent-platform \
            --namespace agent-platform \
            --set anthropicApiKey=test-key \
            --debug

      - name: Validate manifests with kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz \
            | tar xz -C /tmp
          helm template agent-platform charts/agent-platform \
            --set anthropicApiKey=test-key \
            | /tmp/kubeval --ignore-missing-schemas

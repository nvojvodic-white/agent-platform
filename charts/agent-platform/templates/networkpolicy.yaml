{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agent-platform.fullname" . }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agent-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow OTLP to Jaeger
    - ports:
        - port: 4317
          protocol: TCP
    # Allow outbound HTTPS (Anthropic API)
    - ports:
        - port: 443
          protocol: TCP
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-platform.fullname" . }}-secrets
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
type: Opaque
data:
  anthropic-api-key: {{ required "anthropicApiKey is required" .Values.anthropicApiKey | b64enc | quote }}
  {{- if .Values.platformApiKey }}
  platform-api-key: {{ .Values.platformApiKey | b64enc | quote }}
  {{- end }}

{{- if .Values.jaeger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
    {{- include "agent-platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686
            - containerPort: 4317
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    app: jaeger
    {{- include "agent-platform.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: {{ .Values.jaeger.service.nodePort }}
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
  selector:
    app: jaeger
{{- end }}

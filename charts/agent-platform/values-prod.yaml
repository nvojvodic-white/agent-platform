# Production environment overrides
# Usage: helm upgrade --install agent-platform charts/agent-platform \
#          -f charts/agent-platform/values-prod.yaml \
#          --set anthropicApiKey=$ANTHROPIC_API_KEY \
#          --set platformApiKey=$PLATFORM_API_KEY

replicaCount: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

env:
  ENVIRONMENT: production
  OTLP_ENDPOINT: http://jaeger:4317
  DB_PATH: /data/sessions.db

persistence:
  enabled: true
  size: 10Gi

networkPolicy:
  enabled: true

grafana:
  enabled: true
  adminPassword: ""  # Set via --set grafana.adminPassword=$GRAFANA_PASSWORD

prometheus:
  enabled: true
  server:
    retention: 30d

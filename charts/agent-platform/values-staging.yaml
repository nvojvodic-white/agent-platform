# Staging environment overrides
# Usage: helm upgrade --install agent-platform charts/agent-platform \
#          -f charts/agent-platform/values-staging.yaml \
#          --set anthropicApiKey=$ANTHROPIC_API_KEY

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

env:
  ENVIRONMENT: staging
  OTLP_ENDPOINT: http://jaeger:4317
  DB_PATH: /data/sessions.db

persistence:
  enabled: true
  size: 1Gi

grafana:
  enabled: true
  adminPassword: staging-admin

prometheus:
  enabled: true

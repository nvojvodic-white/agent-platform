replicaCount: 2

image:
  repository: agent-platform
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8000
  nodePort: 30000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

env:
  ENVIRONMENT: production
  OTLP_ENDPOINT: http://jaeger:4317

networkPolicy:
  enabled: true

jaeger:
  enabled: true
  service:
    type: NodePort
    nodePort: 30686

prometheus:
  enabled: true
  server:
    service:
      type: NodePort
      nodePort: 30090
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: agent-platform
          static_configs:
            - targets: ["agent-platform:8000"]
          metrics_path: /metrics

grafana:
  enabled: true
  adminPassword: admin123
  service:
    type: NodePort
    nodePort: 30030
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://agent-platform-prometheus-server
          isDefault: true
